<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>فاتورة بيلا لخدمات الضيافة </title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #faf7f5;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.06);
    }

    h2, h3 {
      background: #f5e9e2;
      color: #5c4033;
      padding: 12px 16px;
      border-radius: 6px;
      margin: 18px 0 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px 16px;
      align-items: center;
      margin-bottom: 16px;
    }

    label {
      font-weight: bold;
      white-space: nowrap;
      color: #5c4033;
    }

    input, select, textarea, button {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      font-size: 14px;
      border: 1px solid #d9c8bc;
      border-radius: 6px;
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #d9c8bc;
      padding: 10px;
      text-align: center;
      vertical-align: middle;
    }

    th {
      background: #fbf6f2;
      color: #5c4033;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .btn-add {
      width: auto;
      min-width: 150px;
      background: #a67b5b;
      color: white;
      border: none;
      cursor: pointer;
    }

    .btn-delete {
      width: auto;
      padding: 8px 12px;
      cursor: pointer;
      background: #5c4033;
      color: white;
      border: none;
    }

    .total-box {
      margin-top: 14px;
      font-size: 22px;
      font-weight: bold;
      color: #5c4033;
      background: #f5e9e2;
      padding: 12px;
      border-radius: 8px;
    }

    .print-btn-container {
      margin-top: 16px;
    }

    .print-btn-container button {
      background: #a67b5b;
      color: white;
      border: none;
      cursor: pointer;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    @media print {
      .btn-add,
      .btn-delete,
      .print-btn-container {
        display: none !important;
      }

      body {
        background: #fff;
        padding: 0;
      }

      .container {
        box-shadow: none;
        border: none;
        max-width: 100%;
        padding: 0;
      }
    }
  </style>
</head>
<body>
 </style>
</head>

<body>
<div class="bella-strip"></div>

  <div class="header-text">
   <h3>بيلا لخدمات الضيافة </h3>
  </div>
</div>

<div class="container">

    <div class="grid">
      <label>العنوان</label>
      <input type="text" placeholder="مثال: رسال">

      <label>تاريخ التحرير</label>
      <input type="date">

      <label>القسم</label>
      <input type="text" placeholder="القسم">

      <label>نوع الحفلة</label>
      <select>
        <option value="">اختر</option>
        <option>رجال</option>
        <option>نساء</option>
      </select>

      <label>يوم الحفلة</label>
      <select>
        <option value="">اختر</option>
        <option>الأحد</option>
        <option>الاثنين</option>
        <option>الثلاثاء</option>
        <option>الأربعاء</option>
        <option>الخميس</option>
        <option>الجمعة</option>
        <option>السبت</option>
      </select>

      <label>تاريخ الحفلة</label>
      <input type="date">

      <label>اسم العميل</label>
      <input type="text" placeholder="اسم العميل">

      <label>رقم الجوال</label>
      <input type="tel" placeholder="05xxxxxxxx">
    </div>

    <h3>بيانات الفاتورة</h3>

    <table>
      <thead>
        <tr>
          <th>الصنف</th>
          <th>العدد</th>
          <th>السعر</th>
          <th>الإجمالي</th>
          <th>حذف</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

    <div class="actions">
      <button type="button" class="btn-add" onclick="addRow()">+ إضافة سطر</button>
    </div>

    <div class="total-box">
      المجموع: <span id="grandTotal">0</span> ريال
    </div>

    <h3>الملاحظات</h3>
    <textarea placeholder="اكتب الملاحظات هنا"></textarea>

    <div class="print-btn-container">
      <button type="button" onclick="window.print()">طباعة النموذج</button>
    </div>
  </div>

  <datalist id="jobOptions">
    <option value="مشرفة عامة">
    <option value="مشرفة عبايات">
    <option value="قهوجية / قهوجي">
    <option value="مساعدة قهوجية">
    <option value="صباب / صبابات">
    <option value="عاملة تقديم خدمة / عامل تقديم خدمة">
    <option value="عاملة نظافة / عامل نظافة">
  </datalist>

  <script>
    function numbersOptions(max) {
      let options = "";
      for (let i = 1; i <= max; i++) {
        options += `<option value="${i}">${i}</option>`;
      }
      return options;
    }

    function rowHtml() {
      return `
        <tr>
          <td>
            <input list="jobOptions" placeholder="اختر أو اكتب الصنف">
          </td>
          <td>
            <select onchange="calculateRow(this)">
              ${numbersOptions(50)}
            </select>
          </td>
          <td>
            <input type="number" min="0" placeholder="السعر" oninput="calculateRow(this)">
          </td>
          <td class="rowTotal">0</td>
          <td>
            <button type="button" class="btn-delete" onclick="removeRow(this)">✖</button>
          </td>
        </tr>
      `;
    }

    function addRow() {
      document.getElementById("tableBody").insertAdjacentHTML("beforeend", rowHtml());
    }

    function removeRow(button) {
      const row = button.closest("tr");
      if (row) {
        row.remove();
        calculateGrandTotal();
      }
    }

    function calculateRow(element) {
      const row = element.closest("tr");
      if (!row) return;

      const qty = Number(row.querySelector("select").value || 0);
      const price = Number(row.querySelector('input[type="number"]').value || 0);
      const total = qty * price;

      row.querySelector(".rowTotal").textContent = total;
      calculateGrandTotal();
    }

    function calculateGrandTotal() {
      let sum = 0;
      document.querySelectorAll(".rowTotal").forEach(cell => {
        sum += Number(cell.textContent || 0);
      });
      document.getElementById("grandTotal").textContent = sum;
    }

    window.onload = function () {
      addRow();
    };
  </script>
</body>
</html>
</html>
