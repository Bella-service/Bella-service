<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>فاتورة بيلا لخدمات الضيافة</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #faf7f5;
      margin: 0;
      padding: 0;
    }

    /* ===== الهيدر ===== */
    .hero {
      position: relative;
      width: 100%;
      height: 210px;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background: #e9dfd2;
      border-bottom-left-radius: 28px;
      border-bottom-right-radius: 28px;
    }

    .hero-bg::after {
      content: "";
      position: absolute;
      left: -8%;
      bottom: -18px;
      width: 116%;
      height: 120px;
      background: #1f2747;
      border-top-left-radius: 55% 100%;
      border-top-right-radius: 55% 100%;
      transform: rotate(-4deg);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-logo {
      width: 200px;
      background: #e9dfd2;
      padding: 12px 18px;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }

    .title-under-header {
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      margin: 10px 0 20px;
      color: #5c4033;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.06);
    }

    h3 {
      background: #f5e9e2;
      padding: 12px;
      border-radius: 6px;
      margin: 18px 0 12px;
      color: #5c4033;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
    }

    label {
      margin-bottom: 6px;
      color: #5c4033;
      font-weight: bold;
    }

    input, select, textarea {
      padding: 10px;
      border: 1px solid #d9c8bc;
      border-radius: 6px;
    }

    textarea {
      min-height: 120px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #d9c8bc;
      padding: 10px;
      text-align: center;
    }

    .btn-add {
      background: #a67b5b;
      color: white;
      padding: 10px;
      border: none;
      margin-top: 10px;
      cursor: pointer;
    }

    .btn-delete {
      background: #5c4033;
      color: white;
      border: none;
      padding: 6px;
      cursor: pointer;
    }

    .total-box {
      margin-top: 14px;
      font-size: 20px;
      font-weight: bold;
      background: #f5e9e2;
      padding: 10px;
      border-radius: 6px;
      color: #5c4033;
    }

    .print-btn-container {
      margin-top: 16px;
    }

    .print-btn-container button {
      background: #a67b5b;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      cursor: pointer;
    }

    /* ===== الجوال ===== */
    @media (max-width: 600px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    /* ===== الطباعة (الإصلاح فقط) ===== */
    @page {
      size: A4 portrait;
      margin: 10mm;
    }

    @media print {

      body {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        zoom: 0.9;
      }

      .container {
        width: 100% !important;
        margin: 0 !important;
        box-shadow: none !important;
      }

      html, body {
        overflow: hidden !important;
      }

      .btn-add,
      .btn-delete,
      .print-btn-container {
        display: none !important;
      }
    }

  </style>
</head>

<body>

<header class="hero">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <img src="logo-light.png" class="hero-logo">
  </div>
</header>

<div class="title-under-header">بيلا لخدمات الضيافة</div>

<div class="container">

  <div class="grid">
    <div class="field">
      <label>العنوان</label>
      <input type="text">
    </div>

    <div class="field">
      <label>تاريخ التحرير</label>
      <input type="date">
    </div>

    <div class="field">
      <label>القسم</label>
      <input type="text">
    </div>

    <div class="field">
      <label>نوع الحفلة</label>
      <select>
        <option>اختر</option>
        <option>رجال</option>
        <option>نساء</option>
      </select>
    </div>
  </div>

  <h3>بيانات الفاتورة</h3>

  <table>
    <thead>
      <tr>
        <th>الصنف</th>
        <th>العدد</th>
        <th>السعر</th>
        <th>الإجمالي</th>
        <th>حذف</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <button class="btn-add" onclick="addRow()">+ إضافة</button>

  <div class="total-box">
    المجموع: <span id="grandTotal">0</span>
  </div>

  <h3>الملاحظات</h3>
  <textarea></textarea>

  <div class="print-btn-container">
    <button onclick="window.print()">طباعة النموذج</button>
  </div>

</div>

<script>
function addRow(){
  document.getElementById("tableBody").innerHTML += `
    <tr>
      <td><input></td>
      <td><input type="number" onchange="calc(this)"></td>
      <td><input type="number" onchange="calc(this)"></td>
      <td class="total">0</td>
      <td><button class="btn-delete" onclick="this.closest('tr').remove()">✖</button></td>
    </tr>`;
}

function calc(el){
  let row = el.closest("tr");
  let inputs = row.querySelectorAll("input[type=number]");
  let total = (inputs[0].value || 0) * (inputs[1].value || 0);
  row.querySelector(".total").innerText = total;
}

window.onload = addRow;
</script>

</body>
</html>
