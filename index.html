<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>فاتورة</title>

<style>
body {
  font-family: Arial;
  background: #f7f7f7;
  padding: 20px;
}

.container {
  background: white;
  padding: 20px;
  border-radius: 10px;
}

h2 {
  background: #dfeadf;
  padding: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center;
}

input, select {
  width: 100%;
  padding: 5px;
}

button {
  padding: 6px 10px;
  cursor: pointer;
}

.btn-delete {
  background: #ff4d4d;
  color: white;
  border: none;
}

.add-btn {
  margin-top: 10px;
}

.total-box {
  margin-top: 15px;
  font-size: 18px;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="container">

<h2>بيانات الفاتورة</h2>

<table>
<thead>
<tr>
<th>الصنف</th>
<th>العدد</th>
<th>السعر</th>
<th>الإجمالي</th>
<th>حذف</th>
</tr>
</thead>

<tbody id="tableBody">
</tbody>
</table>

<button class="add-btn" onclick="addRow()">+ إضافة سطر</button>

<div class="total-box">
المجموع: <span id="grandTotal">0</span> ريال
</div>

</div>

<script>

// توليد أرقام 1 إلى 50
function numbersOptions(max) {
  let options = "";
  for (let i = 1; i <= max; i++) {
    options += `<option value="${i}">${i}</option>`;
  }
  return options;
}

// إنشاء صف
function rowHtml() {
  return `
  <tr>

    <td>
      <select onchange="copySelectedToCustom(this)">
        <option value="">اختر</option>
        <option>مشرفة عامة</option>
        <option>مشرفة عبايات</option>
        <option>قهوجية / قهوجي</option>
        <option>مساعدة قهوجية</option>
        <option>صباب / صبابات</option>
        <option>عاملة تقديم خدمة / عامل تقديم خدمة</option>
        <option>عاملة نظافة / عامل نظافة</option>
      </select>

      <input type="text" class="customItem" placeholder="أو اكتب الصنف">
    </td>

    <td>
      <select onchange="calculateRow(this)">
        ${numbersOptions(50)}
      </select>
    </td>

    <td>
      <input type="number" min="0" placeholder="السعر" oninput="calculateRow(this)">
    </td>

    <td class="rowTotal">0</td>

    <td>
      <button class="btn-delete" onclick="removeRow(this)">✖</button>
    </td>

  </tr>
  `;
}

// نسخ الاختيار للخانة اليدوية
function copySelectedToCustom(selectEl) {
  const row = selectEl.closest("tr");
  const input = row.querySelector(".customItem");
  input.value = selectEl.value;
}

// إضافة صف
function addRow() {
  document.getElementById("tableBody")
    .insertAdjacentHTML("beforeend", rowHtml());
}

// حذف صف
function removeRow(btn) {
  btn.closest("tr").remove();
  calculateGrandTotal();
}

// حساب السطر
function calculateRow(el) {
  const row = el.closest("tr");

  const qty = Number(row.querySelector("select:nth-of-type(2)").value || 0);
  const price = Number(row.querySelector("input[type='number']").value || 0);

  const total = qty * price;

  row.querySelector(".rowTotal").textContent = total;

  calculateGrandTotal();
}

// حساب المجموع
function calculateGrandTotal() {
  let sum = 0;

  document.querySelectorAll(".rowTotal").forEach(cell => {
    sum += Number(cell.textContent || 0);
  });

  document.getElementById("grandTotal").textContent = sum;
}

// أول تحميل
window.onload = function () {
  addRow();
};

</script>

</body>
</html>
