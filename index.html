<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title> فاتورة حفلة</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h2>فاتورة حفلة </h2>

<!-- يوم وتاريخ التحرير + القسم + نوع الحفلة -->
<div class="row">
  <label>يوم التحرير</label>
  <span id="dayName" class="span-box"></span>

  <label>تاريخ التحرير</label>
  <span id="todayDate" class="span-box"></span>

  <label>القسم</label>
  <select>
    <option>زاهية</option>
    <option>هام</option>
  </select>

  <label>نوع الحفلة</label>
  <select>
    <option>رجال</option>
    <option>نساء</option>
  </select>
</div>

<!-- يوم وتاريخ الحفلة -->
<div class="row">
  <label>يوم الحفلة</label>
  <select>
    <option>الأحد</option>
    <option>الاثنين</option>
    <option>الثلاثاء</option>
    <option>الأربعاء</option>
    <option>الخميس</option>
    <option>الجمعة</option>
    <option>السبت</option>
  </select>

  <label>تاريخ الحفلة</label>
  <input type="date">
</div>

<!-- اسم العميل -->
<div class="row">
  <label>اسم العميل</label>
  <input type="text">

  <label>رقم الجوال</label>
  <input type="tel">
</div>



<!-- عدد الموظفين -->
<h3>بيانات الفاتورة</h3>

<table id="staffTable">
  <thead>
    <tr>
      <th>الصنف</th>
      <th>العدد</th>
      <th>ملاحظات</th>
      <th>حذف</th>
    </tr>
  </thead>

  <tbody id="tableBody">
    <tr>
      <td>
        <select>
          <option value="">اختر</option>
          <option>مشرفة عامة</option>
          <option>مشرفة عبايات</option>
          <option>قهوجية / قهوجي</option>
          <option>مساعدة قهوجية</option>
          <option>صباب / صبابات</option>
          <option>عاملة تقديم خدمة / عامل تقديم خدمة</option>
          <option>عاملة نظافة / عامل نظافة</option>
        </select>
      </td>

      <td>
        <select>
          <!-- أرقام من 1 إلى 50 -->
          <script>
            document.write(numbers(50));
          </script>
        </select>
      </td>

      <td>
        <input type="text" placeholder="ملاحظات">
      </td>

      <td>
        <button onclick="removeRow(this)">❌</button>
      </td>
    </tr>
  </tbody>
</table>

<br>

<button type="button" onclick="addRow()">➕ إضافة سطر</button>
<h3>الملاحظات</h3>
<td>
  <input type="number" placeholder="السعر" oninput="calculateRow(this)">
</td>

<td class="rowTotal">0</td>


<div class="print-btn-container">
  <button onclick="prepareAndPrint()">طباعة النموذج</button>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
